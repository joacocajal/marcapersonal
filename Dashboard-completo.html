<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · @soyjoacocajal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   Joaquín Cajal — Personal Brand Dashboard
   Dark premium system · inspirado en Linear / Vercel / Raycast
   ============================================================ */

:root {
  /* Surfaces */
  --bg:            #0a0a0a;
  --surface-1:     #111111;
  --surface-2:     #1a1a1a;
  --surface-3:     #202020;

  /* Borders / hairlines */
  --border:        rgba(255, 255, 255, 0.07);
  --border-strong: rgba(255, 255, 255, 0.11);
  --border-faint:  rgba(255, 255, 255, 0.04);

  /* Text */
  --text:          #f5f5f6;
  --text-2:        #a0a0a8;
  --text-3:        #6b6b73;
  --text-4:        #48484f;

  /* Accent — violeta eléctrico */
  --accent:        #7c3aed;
  --accent-hi:     #9d6bff;
  --accent-lo:     #5b21b6;
  --accent-glow:   rgba(124, 58, 237, 0.16);
  --accent-soft:   rgba(124, 58, 237, 0.10);

  /* Platform hues */
  --tiktok:   #ff2d55;
  --ig:       #e1306c;
  --yt:       #ff3b30;
  --x:        #e7e7ea;
  --li:       #2d8cff;

  /* Status (calendario) */
  --st-borrador:  #71717a;
  --st-filmado:   #d4a418;
  --st-editado:   #2d8cff;
  --st-publicado: #2dd4a7;

  /* Geometry */
  --r-sm: 8px;
  --r-md: 11px;
  --r-lg: 16px;
  --r-pill: 999px;

  --sidebar-w: 256px;
  --sidebar-w-collapsed: 72px;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
}

::selection { background: var(--accent-glow); color: #fff; }

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
  border: 3px solid transparent;
  background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); background-clip: padding-box; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  transition: grid-template-columns 0.32s var(--ease);
}
.app.collapsed { grid-template-columns: var(--sidebar-w-collapsed) 1fr; }

/* ---------- Sidebar ---------- */
.sidebar {
  background: var(--surface-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 18px 18px;
  position: relative;
}
.avatar {
  width: 38px; height: 38px;
  border-radius: 11px;
  flex-shrink: 0;
  background: linear-gradient(140deg, var(--accent-hi), var(--accent-lo));
  display: grid; place-items: center;
  font-weight: 650; font-size: 15px; color: #fff;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 4px 16px var(--accent-glow);
  letter-spacing: 0;
}
.brand-meta { display: flex; flex-direction: column; min-width: 0; }
.brand-name { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; }
.brand-handle { font-size: 12.5px; color: var(--text-3); white-space: nowrap; }
.brand-meta, .nav-label, .nav-section-label, .sidebar-foot { transition: opacity 0.18s ease; }
.app.collapsed .brand-meta,
.app.collapsed .nav-label,
.app.collapsed .nav-section-label,
.app.collapsed .sidebar-foot .sf-text { opacity: 0; pointer-events: none; }

.nav { padding: 6px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-section-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  color: var(--text-4); text-transform: uppercase;
  padding: 14px 10px 6px;
  white-space: nowrap;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  color: var(--text-2);
  font-size: 13.5px; font-weight: 450;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--surface-2); color: var(--text); }
.nav-item.active::before {
  content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 17px; border-radius: 0 3px 3px 0;
  background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
}
.nav-item .ic { width: 18px; height: 18px; flex-shrink: 0; color: currentColor; opacity: 0.85; }
.nav-item.active .ic { color: var(--accent-hi); opacity: 1; }

.sidebar-foot {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
}
.sf-card {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r-sm);
  background: var(--surface-2);
  border: 1px solid var(--border-faint);
}
.sf-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--st-publicado); box-shadow: 0 0 8px var(--st-publicado); flex-shrink: 0; }
.sf-text { display: flex; flex-direction: column; min-width: 0; white-space: nowrap; }
.sf-text b { font-size: 12.5px; font-weight: 550; }
.sf-text span { font-size: 11px; color: var(--text-3); }

/* Collapse toggle */
.collapse-btn {
  position: absolute; top: 22px; right: -11px; z-index: 20;
  width: 22px; height: 22px; border-radius: 7px;
  background: var(--surface-2); border: 1px solid var(--border-strong);
  display: grid; place-items: center; color: var(--text-2);
  transition: background 0.15s, color 0.15s, transform 0.3s var(--ease);
}
.collapse-btn:hover { background: var(--surface-3); color: var(--text); }
.app.collapsed .collapse-btn svg { transform: rotate(180deg); }
.collapse-btn svg { transition: transform 0.3s var(--ease); }

/* ============================================================
   MAIN
   ============================================================ */
.main { overflow-y: auto; height: 100vh; position: relative; }

.topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 32px;
  background: rgba(10,10,10,0.72);
  backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--border);
}
.topbar-l { display: flex; flex-direction: column; gap: 2px; }
.crumb { font-size: 12px; color: var(--text-3); font-weight: 450; }
.page-title { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
.topbar-r { display: flex; align-items: center; gap: 10px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border-strong);
  background: var(--surface-2); color: var(--text);
  transition: background 0.15s, border-color 0.15s, transform 0.08s;
}
.btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
.btn:active { transform: scale(0.98); }
.btn .ic { width: 15px; height: 15px; opacity: 0.8; }
.btn.primary {
  background: var(--accent); border-color: transparent; color: #fff;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 6px 20px -6px var(--accent-glow);
}
.btn.primary:hover { background: var(--accent-hi); }
.btn.ghost { background: transparent; border-color: var(--border); color: var(--text-2); }
.btn.ghost:hover { background: var(--surface-2); color: var(--text); }
.btn.sm { padding: 6px 10px; font-size: 12.5px; }

.content { padding: 28px 32px 64px; max-width: 1280px; }

/* page transitions */
.page { display: none; animation: fade 0.35s var(--ease); }
.page.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ============================================================
   GENERIC CARD / PRIMITIVES
   ============================================================ */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin: 34px 0 14px;
}
.section-head:first-child { margin-top: 0; }
.section-head h2 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.section-head .hint { font-size: 12.5px; color: var(--text-3); }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: var(--r-pill);
  font-size: 11px; font-weight: 500; letter-spacing: 0.01em;
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; }
.badge.api {
  background: var(--surface-2); border: 1px solid var(--border-strong);
  color: var(--text-2); cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.badge.api:hover { background: var(--accent-soft); color: var(--accent-hi); border-color: var(--accent); }
.badge.api.connected { color: var(--st-publicado); border-color: rgba(45,212,167,0.3); background: rgba(45,212,167,0.08); cursor: default; }

.kbd {
  font-family: var(--mono); font-size: 11px;
  padding: 2px 6px; border-radius: 5px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-3);
}

/* ============================================================
   MÉTRICAS
   ============================================================ */
.summary-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
}
.summary-card { padding: 18px 20px; position: relative; overflow: hidden; }
.summary-card .sc-label { font-size: 12.5px; color: var(--text-3); display: flex; align-items: center; gap: 7px; }
.summary-card .sc-label .ic { width: 15px; height: 15px; opacity: 0.7; }
.summary-card .sc-value { font-size: 30px; font-weight: 650; letter-spacing: -0.03em; margin-top: 12px; font-variant-numeric: tabular-nums; }
.summary-card .sc-delta { font-size: 12.5px; margin-top: 7px; display: flex; align-items: center; gap: 6px; color: var(--text-3); }
.delta-up { color: var(--st-publicado); font-weight: 550; display: inline-flex; align-items: center; gap: 3px; }
.delta-down { color: var(--tiktok); font-weight: 550; display: inline-flex; align-items: center; gap: 3px; }
.summary-card::after {
  content: ''; position: absolute; right: -40px; top: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-soft), transparent 70%);
  pointer-events: none;
}

.platform-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(228px, 1fr)); gap: 14px;
}
.platform-card { padding: 18px; display: flex; flex-direction: column; gap: 15px; transition: border-color 0.18s, transform 0.18s; }
.platform-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
.pc-head { display: flex; align-items: center; justify-content: space-between; }
.pc-id { display: flex; align-items: center; gap: 10px; }
.pc-logo {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  display: grid; place-items: center;
  background: var(--surface-2); border: 1px solid var(--border);
}
.pc-logo svg { width: 18px; height: 18px; }
.pc-name { font-size: 13.5px; font-weight: 600; }
.pc-handle { font-size: 11.5px; color: var(--text-3); }
.pc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 13px 8px; }
.pc-stat .k { font-size: 11px; color: var(--text-3); }
.pc-stat .v { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; margin-top: 2px; font-variant-numeric: tabular-nums; }
.pc-stat .v small { font-size: 11.5px; color: var(--text-3); font-weight: 450; margin-left: 2px; }

/* growth chart */
.chart-card { padding: 20px 22px; }
.chart-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 14px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-2); }
.legend-swatch { width: 9px; height: 9px; border-radius: 3px; }
.chart-wrap { position: relative; width: 100%; }
.chart-svg { width: 100%; height: auto; display: block; overflow: visible; }
.chart-svg .grid-line { stroke: var(--border-faint); stroke-width: 1; }
.chart-svg .axis-label { fill: var(--text-4); font-size: 10px; font-family: var(--mono); }
.chart-svg .series-path { fill: none; stroke-width: 2; }
.chart-svg .series-dot { stroke: var(--bg); stroke-width: 2; }
.chart-toggles { display: flex; gap: 6px; flex-wrap: wrap; }
.chart-toggle {
  padding: 5px 9px; border-radius: var(--r-pill); font-size: 11.5px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2);
  display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
}
.chart-toggle.off { opacity: 0.4; }
.chart-toggle .legend-swatch { width: 8px; height: 8px; }

/* ============================================================
   IDEAS
   ============================================================ */
.ideas-top {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 18px 20px; margin-bottom: 18px;
}
.ideas-top .it-l { display: flex; flex-direction: column; gap: 3px; }
.ideas-top h3 { font-size: 14.5px; font-weight: 600; }
.ideas-top p { font-size: 12.5px; color: var(--text-3); }

.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.news-card { padding: 16px 17px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.18s; }
.news-card:hover { border-color: var(--border-strong); }
.news-source { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-3); }
.news-source .src-dot { width: 16px; height: 16px; border-radius: 5px; background: var(--surface-3); display: grid; place-items: center; font-size: 9px; font-weight: 700; color: var(--accent-hi); }
.news-card .nc-title { font-size: 14px; font-weight: 550; line-height: 1.4; color: var(--text); text-wrap: pretty; }
.news-card .nc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.news-time { font-size: 11px; color: var(--text-4); font-family: var(--mono); }

.manual-input {
  display: flex; gap: 10px; align-items: center;
  padding: 7px 7px 7px 16px; border-radius: var(--r-md);
  background: var(--surface-1); border: 1px solid var(--border);
  transition: border-color 0.18s, box-shadow 0.18s;
}
.manual-input:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.manual-input .ic { width: 17px; height: 17px; color: var(--text-3); flex-shrink: 0; }
.manual-input input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px;
}
.manual-input input::placeholder { color: var(--text-4); }

.idea-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }
.idea-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; animation: fade 0.4s var(--ease); }
.idea-hook {
  padding: 16px 18px;
  background: linear-gradient(135deg, var(--accent-soft), transparent);
  border-bottom: 1px solid var(--border);
}
.idea-hook .ih-tag { font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; color: var(--accent-hi); text-transform: uppercase; }
.idea-hook .ih-text { font-size: 15px; font-weight: 600; line-height: 1.35; margin-top: 8px; text-wrap: pretty; }
.idea-body { padding: 14px 18px 16px; display: flex; flex-direction: column; gap: 12px; }
.idea-row { display: flex; gap: 11px; }
.idea-row .ir-k { font-size: 11px; color: var(--text-4); width: 60px; flex-shrink: 0; padding-top: 1px; text-transform: uppercase; letter-spacing: 0.03em; }
.idea-row .ir-v { font-size: 13px; color: var(--text-2); line-height: 1.45; text-wrap: pretty; }
.idea-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.fmt-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px; border-radius: var(--r-pill); font-size: 11px; font-weight: 500;
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2);
}

/* ============================================================
   GUIONES
   ============================================================ */
.script-layout { display: grid; grid-template-columns: 340px 1fr; gap: 18px; align-items: start; }
.script-config { padding: 20px; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 92px; }
.cfg-block { display: flex; flex-direction: column; gap: 10px; }
.cfg-label { font-size: 12px; font-weight: 550; color: var(--text-2); display: flex; align-items: center; gap: 7px; }
.cfg-label .ic { width: 14px; height: 14px; color: var(--text-3); }
textarea.cfg-area {
  width: 100%; min-height: 92px; resize: vertical;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 12px 13px;
  color: var(--text); font-size: 13.5px; line-height: 1.5; outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
textarea.cfg-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
textarea.cfg-area::placeholder { color: var(--text-4); }

.fmt-selector { display: flex; flex-direction: column; gap: 7px; }
.fmt-option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 13px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--surface-2);
  transition: border-color 0.15s, background 0.15s;
}
.fmt-option:hover { border-color: var(--border-strong); }
.fmt-option.sel { border-color: var(--accent); background: var(--accent-soft); }
.fmt-radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--text-4); flex-shrink: 0; position: relative; transition: border-color 0.15s; }
.fmt-option.sel .fmt-radio { border-color: var(--accent-hi); }
.fmt-option.sel .fmt-radio::after { content: ''; position: absolute; inset: 2px; border-radius: 50%; background: var(--accent-hi); }
.fmt-option .fo-icon { width: 20px; height: 20px; color: var(--text-2); flex-shrink: 0; }
.fmt-option.sel .fo-icon { color: var(--accent-hi); }
.fmt-option .fo-meta b { font-size: 13px; font-weight: 550; display: block; }
.fmt-option .fo-meta span { font-size: 11.5px; color: var(--text-3); }

/* script output */
.script-output { padding: 0; overflow: hidden; }
.so-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.so-head .so-title { display: flex; align-items: center; gap: 10px; font-size: 13.5px; font-weight: 600; }
.so-dur { font-size: 12px; color: var(--text-3); display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); }
.so-actions { display: flex; gap: 8px; }
.script-body { padding: 8px 20px 20px; }
.script-block { display: grid; grid-template-columns: 110px 1fr; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border-faint); }
.script-block:last-child { border-bottom: none; }
.sb-tag {
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
  padding: 4px 9px; border-radius: 6px; height: fit-content; text-align: center;
  border: 1px solid;
}
.sb-tag.hook    { color: var(--accent-hi); border-color: rgba(157,107,255,0.3); background: var(--accent-soft); }
.sb-tag.camara  { color: var(--st-publicado); border-color: rgba(45,212,167,0.28); background: rgba(45,212,167,0.07); }
.sb-tag.pantalla{ color: var(--li); border-color: rgba(45,140,255,0.28); background: rgba(45,140,255,0.07); }
.sb-tag.broll   { color: var(--st-filmado); border-color: rgba(212,164,24,0.3); background: rgba(212,164,24,0.07); }
.sb-tag.cta     { color: var(--tiktok); border-color: rgba(255,45,85,0.28); background: rgba(255,45,85,0.07); }
.sb-text { font-size: 14px; line-height: 1.6; color: var(--text); text-wrap: pretty; }
.sb-text .stage { color: var(--text-3); font-style: italic; }

/* ============================================================
   CALENDARIO
   ============================================================ */
.cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-week-nav { display: flex; align-items: center; gap: 12px; }
.cal-week-nav .wk-range { font-size: 13.5px; font-weight: 550; }
.cal-nav-btn { width: 30px; height: 30px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface-2); display: grid; place-items: center; color: var(--text-2); transition: all 0.15s; }
.cal-nav-btn:hover { background: var(--surface-3); color: var(--text); }
.cal-legend { display: flex; gap: 14px; flex-wrap: wrap; }

.st-editado-c   { color: var(--st-editado); }

/* ---- line chart (SVG, data-viz) ---- */
const chartState = { hidden: new Set() };
function drawChart() {
  const W = 980, H = 320, padL = 44, padR = 16, padT = 14, padB = 32;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const all = Object.entries(GROWTH).filter(([k]) => !chartState.hidden.has(k));
  const max = Math.max(...all.flatMap(([, v]) => v)) * 1.08;
  const min = 0;
  const x = i => padL + (i / (WEEKS.length - 1)) * innerW;
  const y = v => padT + innerH - ((v - min) / (max - min)) * innerH;

  const gridVals = [0, 0.25, 0.5, 0.75, 1].map(t => min + t * (max - min));
  const grid = gridVals.map(v => `
    <line class="grid-line" x1="${padL}" y1="${y(v).toFixed(1)}" x2="${W - padR}" y2="${y(v).toFixed(1)}"/>
    <text class="axis-label" x="${padL - 8}" y="${(y(v) + 3).toFixed(1)}" text-anchor="end">${Math.round(v)}K</text>`).join('');

  const xlabels = WEEKS.map((w, i) => `<text class="axis-label" x="${x(i).toFixed(1)}" y="${H - 10}" text-anchor="middle">${w}</text>`).join('');

  const series = PLATFORMS.map(p => {
    if (chartState.hidden.has(p.id)) return '';
    const data = GROWTH[p.id];
    const pts = data.map((v, i) => [x(i), y(v)]);
    const d = pts.map((pt, i) => `${i ? 'L' : 'M'}${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(' ');
    const dots = pts.map(pt => `<circle class="series-dot" cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="${p.color}"/>`).join('');
    return `<path class="series-path" d="${d}" stroke="${p.color}" style="filter:drop-shadow(0 0 6px ${p.color}55)"/>${dots}`;
  }).join('');

  $('#chartWrap').innerHTML = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${grid}${xlabels}${series}</svg>`;

  $('#chartToggles').innerHTML = PLATFORMS.map(p => `
    <button class="chart-toggle ${chartState.hidden.has(p.id) ? 'off' : ''}" data-toggle="${p.id}">
      <span class="legend-swatch" style="background:${p.color}"></span>${p.name}
    </button>`).join('');

  $$('#chartToggles [data-toggle]').forEach(b => b.onclick = () => {
    const id = b.dataset.toggle;
    chartState.hidden.has(id) ? chartState.hidden.delete(id) : chartState.hidden.add(id);
    drawChart();
  });
}

/* ====================== 3 · GUIONES ====================== */
let scriptFmt = 'split';
let scriptVariant = 0;
function renderScript() {
  return `
    <div class="script-layout">
      <div class="card script-config">
        <div class="cfg-block">
          <label class="cfg-label">${ic('bulb')} Idea base</label>
          <textarea class="cfg-area" id="scriptIdea">Automaticé el onboarding de clientes y recuperé 9 horas a la semana — muestro el workflow en n8n paso a paso.</textarea>
        </div>
        <div class="cfg-block">
          <label class="cfg-label">${ic('layers')} Formato</label>
          <div class="fmt-selector" id="fmtSelector"></div>
        </div>
        <button class="btn primary" id="btnGenScript" style="justify-content:center">${ic('sparkle')} Generar guion</button>
      </div>

      <div class="card script-output">
        <div class="so-head">
          <div class="so-title">${ic('script')} Guion sugerido</div>
          <div style="display:flex;align-items:center;gap:14px">
            <span class="so-dur">${ic('clock')} <span id="scriptDur">~50s</span></span>
            <div class="so-actions">
              <button class="btn ghost sm" id="btnRegen">${ic('refresh')} Regenerar</button>
              <button class="btn sm" id="btnCopy">${ic('copy')} Copiar</button>
            </div>
          </div>
        </div>
        <div class="script-body" id="scriptBody"></div>
      </div>
    </div>`;
}

function drawFmtSelector() {
  $('#fmtSelector').innerHTML = FORMATS.map(f => `
    <div class="fmt-option ${f.id === scriptFmt ? 'sel' : ''}" data-fmt="${f.id}">
      <span class="fmt-radio"></span>
      ${ic(f.icon, 'fo-icon')}
      <div class="fo-meta"><b>${f.name}</b><span>${f.desc}</span></div>
    </div>`).join('');
  $$('#fmtSelector [data-fmt]').forEach(o => o.onclick = () => { scriptFmt = o.dataset.fmt; drawFmtSelector(); });
}

function drawScriptBody() {
  const blocks = SCRIPT_VARIANTS[scriptVariant];
  $('#scriptBody').innerHTML = blocks.map(b => `
    <div class="script-block">
      <div class="sb-tag ${b.cls}">${b.tag}</div>
      <div class="sb-text">${b.text}</div>
    </div>`).join('');
  $('#scriptDur').textContent = scriptVariant === 0 ? '~50s' : '~42s';
}

/* ====================== 4 · CALENDARIO ====================== */
function renderCalendar() {
  const legend = ['borrador', 'filmado', 'editado', 'publicado'].map(s => `
    <span class="cal-leg-item"><span class="cal-leg-dot" style="background:var(--st-${s})"></span>${STATUS_LABEL[s]}</span>`).join('');

  const cols = CAL.map(day => {
    const cards = day.items.map(it => {
      const p = PLATFORMS.find(x => x.id === it.plat);
      return `
        <div class="cal-card st-${it.status}">
          <div class="cc-plat">${platSvg(it.plat)}<span class="cc-time">${it.time}</span></div>
          <div class="cc-title">${it.title}</div>
          <div class="cc-status st-${it.status}-c"><span class="st-dot" style="background:var(--st-${it.status})"></span>${STATUS_LABEL[it.status]}</div>
        </div>`;
    }).join('');
    return `
      <div class="cal-col">
        <div class="cal-day-head ${day.today ? 'today' : ''}">
          <span class="cd-dow">${day.dow}</span><span class="cd-num">${day.num} may</span>
        </div>
        <div class="cal-slots">${cards}<button class="cal-add" title="Añadir contenido">${ic('plus', 'ic')}</button></div>
      </div>`;
  }).join('');

  return `
    <div class="cal-toolbar">
      <div class="cal-week-nav">
        <button class="cal-nav-btn">${ic('chevron', 'ic')}</button>
        <span class="wk-range">25 — 31 mayo, 2026</span>
        <button class="cal-nav-btn" style="transform:rotate(180deg)">${ic('chevron', 'ic')}</button>
      </div>
      <div class="cal-legend">${legend}</div>
    </div>
    <div class="cal-grid">${cols}</div>`;
}

window.RENDER = { renderMetrics, drawChart, renderIdeas, newsCard, ideaCard, renderScript, drawFmtSelector, drawScriptBody, renderCalendar,
  get scriptVariant() { return scriptVariant; }, set scriptVariant(v) { scriptVariant = v; } };
})();

</script>
<script>
/* ============================================================
   app.js — navegación, sidebar, interacciones simuladas
   ============================================================ */
(function () {
  const { ic, $, $$ } = window.DB;
  const R = window.RENDER;

  const PAGES = {
    metrics:  { title: 'Métricas',            crumb: 'Workspace · Métricas',  build: R.renderMetrics,
                actions: `<button class="btn ghost">${ic('refresh')} Sincronizar</button><button class="btn">Últimos 30 días ${ic('chevron')}</button>` },
    ideas:    { title: 'Generador de ideas',  crumb: 'Workspace · Ideas',     build: R.renderIdeas,
                actions: `<span class="kbd">⌘ K</span>` },
    script:   { title: 'Generador de guiones', crumb: 'Workspace · Guiones',  build: R.renderScript,
                actions: `<button class="btn ghost">${ic('script')} Mis guiones</button>` },
    calendar: { title: 'Calendario de contenido', crumb: 'Workspace · Calendario', build: R.renderCalendar,
                actions: `<button class="btn primary">${ic('plus')} Nuevo contenido</button>` },
  };

  /* inject nav icons */
  const NAV_IC = { metrics: 'metrics', ideas: 'bulb', script: 'script', calendar: 'calendar' };
  $$('.nav-item').forEach(n => { n.querySelector('.ic-slot').outerHTML = ic(NAV_IC[n.dataset.page]); });

  let current = null;
  function go(page) {
    if (current === page) return;
    current = page;
    const cfg = PAGES[page];

    $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
    $('#pageTitle').textContent = cfg.title;
    $('#crumb').textContent = cfg.crumb;
    $('#topbarActions').innerHTML = cfg.actions;

    const el = $('#page-' + page);
    if (!el.dataset.built) { el.innerHTML = cfg.build(); el.dataset.built = '1'; afterBuild(page); }
    $$('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + page));
    $('.main').scrollTop = 0;
  }

  function afterBuild(page) {
    if (page === 'metrics') initMetrics();
    if (page === 'ideas') initIdeas();
    if (page === 'script') initScript();
    if (page === 'calendar') initCalendar();
  }

  /* ---------- nav + collapse ---------- */
  $$('.nav-item').forEach(n => n.addEventListener('click', () => go(n.dataset.page)));
  $('#collapseBtn').addEventListener('click', () => $('#app').classList.toggle('collapsed'));

  /* ---------- METRICS ---------- */
  function initMetrics() {
    R.drawChart();
    $$('[data-api]').forEach(b => b.addEventListener('click', () => {
      if (b.classList.contains('connected')) return;
      b.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
      setTimeout(() => {
        b.classList.add('connected');
        b.innerHTML = '<span class="dot" style="background:var(--st-publicado)"></span> Conectada';
      }, 1100);
    }));
  }

  /* ---------- IDEAS ---------- */
  function initIdeas() {
    const { NEWS, IDEAS_SEED } = window.DB;
    const btnNews = $('#btnNews'), newsGrid = $('#newsGrid');
    const ideaGrid = $('#ideaGrid'), ideasHead = $('#ideasHead');

    function showIdeas() {
      ideasHead.style.display = 'flex';
      ideaGrid.innerHTML = '';
      IDEAS_SEED.forEach((idea, i) => {
        setTimeout(() => { ideaGrid.insertAdjacentHTML('beforeend', R.ideaCard(idea)); wireIdeaBtns(); }, i * 140);
      });
    }
    function wireIdeaBtns() {
      $$('#ideaGrid [data-toscript]').forEach(b => b.onclick = () => go('script'));
    }

    btnNews.addEventListener('click', () => {
      btnNews.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> Buscando…';
      newsGrid.innerHTML = '';
      setTimeout(() => {
        btnNews.innerHTML = ic('search') + ' Buscar noticias IA hoy';
        NEWS.forEach((n, i) => setTimeout(() => {
          newsGrid.insertAdjacentHTML('beforeend', R.newsCard(n));
          $$('#newsGrid [data-genidea]').forEach(b => b.onclick = showIdeas);
        }, i * 90));
      }, 900);
    });

    $('#btnManual').addEventListener('click', showIdeas);
    $('#ideaInput').addEventListener('keydown', e => { if (e.key === 'Enter') showIdeas(); });

    // pre-poblar noticias para que no se vea vacío
    NEWS.forEach(n => newsGrid.insertAdjacentHTML('beforeend', R.newsCard(n)));
    $$('#newsGrid [data-genidea]').forEach(b => b.onclick = showIdeas);
  }

  /* ---------- SCRIPT ---------- */
  function initScript() {
    R.drawFmtSelector();
    R.drawScriptBody();

    $('#btnGenScript').addEventListener('click', regen);
    $('#btnRegen').addEventListener('click', regen);
    function regen() {
      const body = $('#scriptBody');
      body.style.opacity = '0.35';
      R.scriptVariant = (R.scriptVariant + 1) % window.DB.SCRIPT_VARIANTS.length;
      setTimeout(() => { R.drawScriptBody(); body.style.opacity = '1'; }, 350);
    }

    $('#btnCopy').addEventListener('click', () => {
      const txt = window.DB.SCRIPT_VARIANTS[R.scriptVariant]
        .map(b => `[${b.tag}]\n${b.text.replace(/<[^>]+>/g, '')}`).join('\n\n');
      navigator.clipboard?.writeText(txt).catch(() => {});
      const btn = $('#btnCopy');
      const prev = btn.innerHTML;
      btn.innerHTML = '✓ Copiado';
      setTimeout(() => btn.innerHTML = prev, 1500);
    });
  }

  /* ---------- CALENDAR ---------- */
  function initCalendar() {
    $$('.cal-add').forEach(b => b.addEventListener('click', () => {
      b.style.borderColor = 'var(--accent)';
      b.style.color = 'var(--accent-hi)';
      setTimeout(() => { b.style.borderColor = ''; b.style.color = ''; }, 600);
    }));
  }

  /* boot */
  go('metrics');
})();

</script>
